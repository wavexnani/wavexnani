<svg width="100%" height="120" viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg">
  <style>
    .footer-wave {
      animation: driftFooter 9s ease-in-out infinite;
    }
    @keyframes driftFooter {
      0%   { transform: translateX(0); }
      50%  { transform: translateX(40px); }
      100% { transform: translateX(0); }
    }
  </style>
  <defs>
    <linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#24243e"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
  </defs>
  <path class="footer-wave" fill="url(#fbg)" d="M0,40 Q300,10 600,40 T1200,40 V120 H0 Z"/>
</svg>
