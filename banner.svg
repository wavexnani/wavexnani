<svg width="100%" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: url(#bg); }
    .wave-back {
      fill: #1b1836;
      opacity: 0.55;
      animation: drift 9s ease-in-out infinite;
    }
    .wave-front {
      fill: #00ff9c;
      opacity: 0.12;
      animation: drift 6s ease-in-out infinite reverse;
    }
    .title {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 58px;
      font-weight: 700;
      fill: #00ff9c;
      text-anchor: middle;
      animation: fadeIn 1.2s ease-out forwards;
      opacity: 0;
    }
    .subtitle {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 17px;
      fill: #8be9fd;
      text-anchor: middle;
      animation: fadeIn 1.2s ease-out 0.6s forwards;
      opacity: 0;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes drift {
      0%   { transform: translateX(0); }
      50%  { transform: translateX(-40px); }
      100% { transform: translateX(0); }
    }
  </style>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="1200" height="260"/>

  <path class="wave-back" d="M0,200 Q200,170 400,200 T800,200 T1200,200 V260 H0 Z"/>
  <path class="wave-front" d="M0,180 Q300,150 600,180 T1200,180 V260 H0 Z"/>

  <text class="title" x="600" y="115">Chandra Mouli</text>
  <text class="subtitle" x="600" y="155">Building at the intersection of hardware &amp; software</text>
</svg>
